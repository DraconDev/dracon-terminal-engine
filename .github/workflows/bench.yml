name: Benchmark

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'benches/**'
      - '.github/workflows/bench.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'benches/**'
      - '.github/workflows/bench.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          rust-toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          cargo bench 2>&1 | tee benchmark_output.txt

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark_output.txt
          retention-days: 90

      - name: Download main branch baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: bench.yml
          branch: main
          name: benchmark-results
          path: baseline

      - name: Compare to main branch
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f baseline/benchmark_output.txt ]; then
            echo "Baseline found. Comparing..." >> $GITHUB_STEP_SUMMARY
            echo "**Current PR:**" >> $GITHUB_STEP_SUMMARY
            grep -E "(test.*time:)" benchmark_output.txt | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Main branch:**" >> $GITHUB_STEP_SUMMARY
            grep -E "(test.*time:)" baseline/benchmark_output.txt | head -20 >> $GITHUB_STEP_SUMMARY || true
          else
            echo "No baseline found (first run or baseline expired)." >> $GITHUB_STEP_SUMMARY
          fi

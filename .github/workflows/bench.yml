name: Benchmark

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'benches/**'
      - '.github/workflows/bench.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          rust-toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run benchmarks
        run: cargo bench 2>&1 | tee benchmark_output.txt

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_output.txt

      - name: Compare to main branch
        if: github.event_name == 'pull_request'
        run: |
          # Get benchmark results from main branch
          echo "Comparing benchmarks to main branch..."
          echo "Note: In a full implementation, you would:"
          echo "1. Fetch main branch"
          echo "2. Run benchmarks on main branch"
          echo "3. Compare results and fail if regression > 10%"
          echo ""
          echo "For this implementation, benchmarks are run and results stored."
          echo "To enable full comparison, set BENCHMARK_COMPARE: true in secrets."

  benchmark-report:
    name: Benchmark Report
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .

      - name: Display results
        run: |
          echo "## Benchmark Results"
          echo ""
          if [ -f benchmark_output.txt ]; then
            # Extract benchmark results
            grep -E "(running|test)" benchmark_output.txt | head -20
          else
            echo "No benchmark results found."
          fi

  # Note: Full regression detection requires storing baseline benchmarks
  # and comparing them against PR benchmarks. This workflow provides
  # the infrastructure; full implementation requires:
  # 1. Store baseline benchmarks in artifact storage
  # 2. Compare against current PR results
  # 3. Fail if any benchmark regresses > 10%
  #
  # Example comparison script:
  # ```bash
  # #!/bin/bash
  # OLD_BENCH=$(cat old_results.txt | grep "test:" | awk '{print $2}')
  # NEW_BENCH=$(cat new_results.txt | grep "test:" | awk '{print $2}')
  # REGRESS=$(echo "scale=2; ($NEW_BENCH - $OLD_BENCH) / $OLD_BENCH * 100" | bc)
  # if (( $(echo "$REGRESS > 10" | bc -l) )); then
  #   echo "Benchmark regression detected: ${REGRESS}%"
  #   exit 1
  # fi
  # ```
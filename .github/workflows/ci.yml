name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]
        # Only run latest stable on macOS and Windows to save CI time
        include:
          - os: macos-latest
            rust: stable
          - os: windows-latest
            rust: stable

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          rust-toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tools/tui/dracon-terminal-engine -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: tools/tui/dracon-terminal-engine

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: tools/tui/dracon-terminal-engine

      - name: Run tests
        run: cargo test --all-features -- --test-threads=4
        working-directory: tools/tui/dracon-terminal-engine

  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          rust-toolchain: stable
      - name: Check
        run: cargo +nightly -Zminimal-versions build --all-features
        working-directory: tools/tui/dracon-terminal-engine

  rustsec:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

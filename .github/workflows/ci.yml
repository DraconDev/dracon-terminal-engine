name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]
        include:
          - os: macos-latest
            rust: stable
          - os: windows-latest
            rust: stable

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          rust-toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --all-targets --all-features
          cargo clippy --examples --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features -- --test-threads=4

  rustsec:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  outdated:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
      - name: Check outdated
        run: |
          cargo install cargo-outdated --locked 2>/dev/null || true
          cargo outdated -e Rust || true

  changelog:
    name: Changelog Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            # Check for required sections
            grep -q '^## \[[0-9]\.' CHANGELOG.md || { echo "Missing version header format"; exit 1; }
            grep -q '^### Added\|^### Changed\|^### Fixed' CHANGELOG.md || { echo "Missing section headers"; exit 1; }
            echo "CHANGELOG.md format OK"
          fi

# Dracon Terminal Engine — Default Configuration
#
# This file defines the default keybindings and style for all examples.
# Resolution order (later overrides earlier):
#   1. Engine defaults (compiled-in)
#   2. User global: ~/.config/dracon/dracon.toml
#   3. Project-local: ./dracon.toml (this file)
#
# Philosophy: modifier keys for actions, never single letters.
# Single letters conflict with text input in forms, editors, etc.

[keybindings]
# Core (always safe — no text input conflict)
quit = "ctrl+q"          # Emergency quit — not single-key to avoid accidents
help = "f1"              # F1 is universal help; ? conflicts with text input
cancel = "esc"           # Dismiss overlays, cancel operations
back = "ctrl+esc"        # Go back / close modal (distinct from cancel)
submit = "enter"         # Confirm / submit form
tab_next = "tab"         # Navigate to next field
tab_prev = "shift+tab"   # Navigate to previous field

# Tabs (browser/IDE standard)
new_tab = "ctrl+t"
close_tab = "ctrl+w"

# File operations (universal standard)
save = "ctrl+s"
new_item = "ctrl+n"
delete = "ctrl+d"        # Always shows confirmation dialog
edit = "ctrl+e"

# Search
search = "ctrl+f"        # Not / (conflicts with text input)

# Theme cycling is NOT a hotkey — use UI (Select widget in settings)
# Refresh is NOT a hotkey — automatic or button
# View mode toggles are NOT hotkeys — Toggle widget

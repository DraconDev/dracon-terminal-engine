[package]
name = "dracon-terminal-engine"
version = "1.1.1"
edition.workspace = true
license = "MIT"
authors = ["Dracon"]
description = "A next-generation terminal compositor engine for Rust. Z-indexed layers, TrueColor, SGR mouse, Kitty keyboard, and drop-in Ratatui support."
repository = "https://github.com/DraconDev/dracon-libs"
keywords = ["terminal", "tui", "compositor", "ratatui", "cli"]
categories = ["command-line-interface", "rendering"]

[dependencies]
libc = "0.2"
bitflags = "2.4"
ratatui = { version = "0.29", default-features = false }
unicode-width = "0.1"
rand = "0.8"
log = "0.4"
chrono = { workspace = true }
signal-hook = "0.3"
serde = { workspace = true }
sysinfo = "0.32"
image = "0.24"
syntect = "5.2"

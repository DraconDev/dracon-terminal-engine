[package]
name = "dracon-terminal-engine"
version = "27.23.18"
edition.workspace = true
license.workspace = true
authors.workspace = true
readme = "README.md"
description = "A terminal application framework for Rust — App, widgets, compositor, themes, and 15 built-in themes"
repository.workspace = true
homepage = "https://github.com/DraconDev/dracon-terminal-engine"
documentation = "https://docs.rs/dracon-terminal-engine"
keywords = ["terminal", "tui", "framework", "compositor", "cli"]
categories = ["command-line-interface", "rendering"]

[dependencies]
bitflags = { version = "2.4", features = ["serde"] }
ratatui = { version = "0.29", default-features = false }
unicode-width = "0.1"
chrono = { workspace = true, features = ["serde", "clock"] }
signal-hook = "0.3"
serde = { workspace = true }
serde_json = "1.0"
toml = "0.8"
sysinfo = "0.32"
syntect = "5.2"
tokio = { workspace = true, optional = true }
regex = "1.10"

[target.'cfg(not(target_os = "windows"))'.dependencies]
libc = "0.2"

[dev-dependencies]
rand = "0.8"
tempfile = "3.10"

[[example]]
name = "system_monitor"
path = "examples/_apps/system_monitor.rs"

[[example]]
name = "file_manager"
path = "examples/_apps/file_manager.rs"

[[example]]
name = "chat_client"
path = "examples/_apps/chat_client.rs"

[[example]]
name = "dashboard_builder"
path = "examples/_apps/dashboard_builder.rs"

[[example]]
name = "widget_gallery"
path = "examples/_cookbook/widget_gallery.rs"

[[example]]
name = "tree_navigator"
path = "examples/_cookbook/tree_navigator.rs"

[[example]]
name = "log_monitor"
path = "examples/_cookbook/log_monitor.rs"

[[example]]
name = "tabbed_panels"
path = "examples/_cookbook/tabbed_panels.rs"

[[example]]
name = "data_table"
path = "examples/_cookbook/data_table.rs"

[[example]]
name = "split_resizer"
path = "examples/_cookbook/split_resizer.rs"

[[example]]
name = "command_bindings"
path = "examples/_cookbook/command_bindings.rs"

[[example]]
name = "menu_system"
path = "examples/_cookbook/menu_system.rs"

[[example]]
name = "debug_overlay"
path = "examples/_cookbook/debug_overlay.rs"

[features]
default = []
async = ["tokio"]

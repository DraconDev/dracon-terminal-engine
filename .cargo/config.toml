[alias]
# Launch the example showcase (auto-builds missing binaries)
showcase = "run --example showcase"

# Quick-run individual examples
wg = "run --example widget_gallery"
tree = "run --example tree_navigator"
log = "run --example log_monitor"
tabs = "run --example tabbed_panels"
table = "run --example data_table"
split = "run --example split_resizer"
cmd = "run --example command_bindings"
menu = "run --example menu_system"
debug = "run --example debug_overlay"
sysmon = "run --example system_monitor"
fm = "run --example file_manager"
chat = "run --example chat_client"
dash = "run --example dashboard_builder"
form = "run --example form_demo"
theme = "run --example theme_switcher"
modal = "run --example modal_demo"
tutorial = "run --example widget_tutorial"
cdash = "run --example command_dashboard"
fdemo = "run --example framework_demo"
fchat = "run --example framework_chat"
ffm = "run --example framework_file_manager"
fwidgets = "run --example framework_widgets"
cyber = "run --example cyberpunk_dashboard"

# Build all examples at once
build-examples = "build --examples"
